<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>crashout counter</title>
  <meta name="description" content="how long has it been since you crashed out? press the frog to find out." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="frog.png" />
</head>
<body>
  <div class="fx-layer" id="fxLayer" aria-hidden="true"></div>

  <main class="card">
    <img class="frog" id="frog" src="frog.png" alt="a small frog on the verge of tears" width="200" height="200" />

    <p class="eyebrow">it's been</p>

    <p class="counter" id="counter">
      <span id="d">0</span>d <span id="h">0</span>h <span id="m">0</span>m <span id="s">0</span>s
    </p>

    <p class="subtitle">since your last crashout</p>

    <button class="btn" id="crashoutBtn" type="button">i'm crashing out 😭</button>

    <p class="mini" id="footnote">
      <span id="statResisted">0</span> crashouts resisted
      &nbsp;·&nbsp; <span id="statTotal">0</span> total
      &nbsp;·&nbsp; best streak <span id="statRecord">—</span>
    </p>

    <div class="links">
      <button class="link" id="undoBtn" type="button" hidden>undo</button>
      <button class="link" id="syncBtn" type="button">sync</button>
    </div>
  </main>

  <dialog class="modal" id="syncModal">
    <form method="dialog" class="modal__inner">
      <h2 class="modal__title">☁ sync across devices</h2>
      <p class="modal__blurb">
        Your crashouts save in this browser by default. To back them up to a private GitHub
        Gist so they follow you everywhere, paste a token below. It's stored only in this browser.
      </p>

      <label class="field">
        <span class="field__label">GitHub token</span>
        <input class="field__input" id="ghToken" type="password" autocomplete="off" placeholder="gho_… or github_pat_…" />
      </label>

      <label class="field">
        <span class="field__label">Gist ID <span class="field__hint">(pre-filled for you)</span></span>
        <input class="field__input" id="ghGist" type="text" autocomplete="off" placeholder="gist id" />
      </label>

      <p class="modal__status" id="syncStatus"></p>

      <div class="modal__actions">
        <button class="modal__btn" value="cancel" type="submit">close</button>
        <button class="modal__btn modal__btn--danger" id="ghDisconnect" value="disconnect" type="button" hidden>disconnect</button>
        <button class="modal__btn modal__btn--go" id="ghConnect" value="connect" type="button">connect</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
